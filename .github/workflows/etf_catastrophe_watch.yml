name: ETF Catastrophe Watch

on:
  schedule:
    - cron: "*/15 5-21 * * *"
  workflow_dispatch:

jobs:
  run-watch:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run catastrophe watch
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          ETF_NAME: SPDR MSCI World UCITS ETF
          ETF_TICKER: SPPW
          YAHOO_SYMBOL: SPPW.DE
          TIMEZONE: Europe/Madrid
          RUN_MODE: catastrophe_watch
          AI_SUMMARIES_ENABLED: "0"
          GITHUB_EVENT_NAME: ${{ github.event_name }}
          FORCE_SEND: ${{ github.event_name == 'workflow_dispatch' && '1' || '0' }}
          PYTHONUNBUFFERED: "1"
        run: python bot.py
