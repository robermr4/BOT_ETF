name: ETF Catastrophe Watch

on:
  schedule:
    - cron: "*/15 5-21 * * *"
  workflow_dispatch:

jobs:
  run-watch:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Cache Hugging Face model
        uses: actions/cache@v4
        with:
          path: .hf-cache
          key: hf-${{ runner.os }}-${{ hashFiles('requirements.txt') }}-bart-large-cnn-nllb-flan-v4

      - name: Restore alert state
        uses: actions/cache/restore@v4
        with:
          path: .runtime
          key: alert-state-${{ github.run_id }}
          restore-keys: |
            alert-state-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run catastrophe watch
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          ETF_NAME: SPDR MSCI World UCITS ETF
          ETF_TICKER: SPPW
          YAHOO_SYMBOL: SPPW.DE
          TIMEZONE: Europe/Madrid
          RUN_MODE: catastrophe_watch
          AI_SUMMARIES_ENABLED: "1"
          AI_MODEL_NAME: google/flan-t5-base
          AI_NEWS_SUMMARY_MODEL: facebook/bart-large-cnn
          AI_TRANSLATION_MODEL: facebook/nllb-200-distilled-600M
          AI_TRANSLATION_SOURCE_LANG: eng_Latn
          AI_TRANSLATION_TARGET_LANG: spa_Latn
          HF_HOME: ./.hf-cache
          GITHUB_EVENT_NAME: ${{ github.event_name }}
          FORCE_SEND: ${{ github.event_name == 'workflow_dispatch' && '1' || '0' }}
          PYTHONUNBUFFERED: "1"
        run: python bot.py

      - name: Save alert state
        if: always()
        uses: actions/cache/save@v4
        with:
          path: .runtime
          key: alert-state-${{ github.run_id }}
